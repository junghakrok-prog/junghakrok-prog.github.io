<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neo Panel — Test</title>
<style>
  body { font-family: -apple-system, sans-serif; padding: 20px; line-height: 1.7; color: #2d3436; max-width: 600px; margin: 0 auto; }
  h1 { color: #00b894; }
  .ok { color: #00b894; font-weight: bold; }
  .info { background: #f8f9fa; padding: 12px; border-radius: 8px; font-size: 13px; word-break: break-all; }
  code { background: #fff8f0; padding: 2px 6px; border-radius: 4px; color: #e67e22; }
</style>
</head>
<body>
<h1>✓ GitHub Pages 정상 작동</h1>
<p class="ok">이 페이지가 보이면 GH Pages 호스팅 자체는 OK입니다.</p>
<p>이제 메인 앱이 안 뜬다면 React 앱 코드 또는 캐시 문제일 가능성.</p>
<hr/>
<h3>현재 상태</h3>
<div class="info">
  <strong>URL:</strong> <span id="u"></span><br/>
  <strong>UserAgent:</strong> <span id="ua"></span><br/>
  <strong>Service Worker 등록 여부:</strong> <span id="sw"></span><br/>
  <strong>localStorage 사용 가능:</strong> <span id="ls"></span>
</div>
<hr/>
<h3>SW 강제 제거</h3>
<p>아래 버튼 누르면 이 도메인의 모든 Service Worker 제거 + 캐시 비움. 그 후 메인 앱 다시 접속.</p>
<button id="clean" style="padding:14px 24px;background:#e67e22;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin:8px 0">🧹 SW + 캐시 완전 제거</button>
<p style="margin-top:24px"><a href="./" style="color:#e67e22">→ 메인 앱으로</a></p>

<script>
document.getElementById('u').textContent = location.href;
document.getElementById('ua').textContent = navigator.userAgent;
try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); document.getElementById('ls').textContent = 'YES'; }
catch(e) { document.getElementById('ls').textContent = 'NO ('+e.message+')'; }

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => {
    document.getElementById('sw').textContent = rs.length + '개' + (rs.length ? ' (' + rs.map(r=>r.active && r.active.scriptURL).join(', ') + ')' : '');
  });
} else {
  document.getElementById('sw').textContent = 'unsupported';
}

document.getElementById('clean').onclick = async () => {
  let log = [];
  if ('serviceWorker' in navigator) {
    const rs = await navigator.serviceWorker.getRegistrations();
    for (const r of rs) { await r.unregister(); log.push('SW 제거: ' + (r.active && r.active.scriptURL)); }
  }
  if (window.caches) {
    const ks = await caches.keys();
    for (const k of ks) { await caches.delete(k); log.push('Cache 제거: ' + k); }
  }
  try { localStorage.clear(); log.push('localStorage 비움'); } catch(e){}
  alert('완료:\n\n' + log.join('\n') + '\n\n메인 앱 다시 접속해 보세요.');
};
</script>
</body>
</html>
